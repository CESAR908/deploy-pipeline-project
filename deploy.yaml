name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t deploy-pipeline-app:latest .

      - name: Run tests
        run: docker run --rm deploy-pipeline-app:latest npm test || true

      - name: Display image info
        run: docker images deploy-pipeline-app
